<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameCore Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
display:flex;
background:#020617;
color:white;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#0f172a;
padding:20px;
}

.sidebar h2{
color:#22c55e;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
margin:15px 0;
text-decoration:none;
opacity:0.7;
}

.sidebar a:hover{
opacity:1;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* TOPBAR */
.top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.search{
background:#1e293b;
padding:10px;
border-radius:8px;
width:200px;
}

.profile{
background:#1e293b;
padding:10px 15px;
border-radius:8px;
}

/* FEATURED */
.feature{
background:linear-gradient(to right,#22c55e,#3b82f6);
padding:30px;
border-radius:15px;
margin-bottom:20px;
}

/* SCROLL PRODUCTS */
.scroll{
display:flex;
gap:15px;
overflow-x:auto;
margin-bottom:20px;
}

.card{
min-width:160px;
background:#1e293b;
padding:10px;
border-radius:10px;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:8px;
}

/* LIST */
.list{
display:flex;
flex-direction:column;
gap:10px;
}

.item{
background:#1e293b;
padding:15px;
border-radius:8px;
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>GameCore 🎮</h2>
    <a href="#">Dashboard</a>
    <a href="#">Products</a>
    <a href="#">Orders</a>
    <a href="#">Settings</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP -->
    <div class="top">
        <div class="search">🔍 Search</div>
        <div class="profile">👤 User</div>
    </div>

    <!-- FEATURE -->
    <div class="feature">
        <h2>🔥 New Gaming Setup</h2>
        <p>Upgrade your gear with premium accessories</p>
    </div>

    <!-- SCROLL -->
    <div class="scroll">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=600">
            <p>Keyboard</p>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1616628182506-6e2f2bb6c7c5?w=600">
            <p>Headset</p>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1585079542156-2755d9c8a094?w=600">
            <p>Mouse</p>
        </div>
    </div>

    <!-- LIST -->
    <div class="list">
        <div class="item">
            <span>RGB Keyboard</span>
            <span>₹4,500</span>
        </div>
        <div class="item">
            <span>Gaming Headset</span>
            <span>₹3,200</span>
        </div>
        <div class="item">
            <span>Gaming Mouse</span>
            <span>₹1,800</span>
        </div>
    </div>

</div>

</body>
</html>
