<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Hub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0b0f19;
}

/* Header */
header {
    background: #111827;
    color: #22c55e;
    padding: 18px;
    text-align: center;
    font-size: 26px;
    letter-spacing: 2px;
}

/* Layout */
.container {
    display: flex;
    min-height: 90vh;
}

/* Sidebar */
nav {
    width: 22%;
    background: #020617;
    color: white;
    padding: 20px;
}

nav h3 {
    margin-bottom: 15px;
    color: #22c55e;
}

nav a {
    display: block;
    color: #94a3b8;
    text-decoration: none;
    margin: 12px 0;
    padding: 8px;
    border-radius: 6px;
    transition: 0.3s;
}

nav a:hover {
    background: #1e293b;
    color: #22c55e;
}

/* Main */
section {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 25px;
}

/* Cards */
.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
    background: #1e293b;
}

/* Album image */
.card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* Title */
.card h4 {
    color: #22c55e;
    margin-bottom: 5px;
}

/* Artist */
.card p {
    color: #94a3b8;
    font-size: 14px;
}

/* Responsive */
@media (max-width: 600px) {
    .container {
        flex-direction: column;
    }

    nav {
        width: 100%;
        text-align: center;
    }

    section {
        grid-template-columns: 1fr;
    }
}

@media (min-width: 601px) and (max-width: 900px) {
    section {
        grid-template-columns: repeat(2, 1fr);
    }
}

</style>
</head>

<body>

<header>
    🎧 Music Hub
</header>

<div class="container">

    <nav>
        <h3>Browse</h3>
        <a href="#">Home</a>
        <a href="#">Trending</a>
        <a href="#">Library</a>
        <a href="#">Playlists</a>
    </nav>

    <section>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4">
            <h4>Midnight Beats</h4>
            <p>Lo-fi Chill</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f">
            <h4>Energy Boost</h4>
            <p>Workout Mix</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2">
            <h4>Sad Vibes</h4>
            <p>Emotional Tracks</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81">
            <h4>Party Mode</h4>
            <p>Dance Hits</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1506157786151-b8491531f063">
            <h4>Focus Zone</h4>
            <p>Deep Work</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1497032205916-ac775f0649ae">
            <h4>Road Trip</h4>
            <p>Travel Playlist</p>
        </div>

    </section>

</div>

</body>
</html>
