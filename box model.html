<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace Layout - Margin vs Padding</title>

<style>
body {
    font-family: Arial;
    background: #1e1e2f;
    color: white;
    margin: 0;
}

/* TITLE */
h1 {
    text-align: center;
    padding: 20px;
}

/* TABS */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.tabs button {
    padding: 10px 20px;
    border: none;
    background: #2c2c3e;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}

.tabs button.active {
    background: #00bcd4;
}

/* CONTENT AREA */
.content {
    display: none;
    padding: 30px;
    text-align: center;
}

.content.active {
    display: block;
}

/* BOXES */
.box {
    border-radius: 10px;
    margin: 40px auto;
    width: 200px;
    transition: 0.3s;
}

/* HOVER */
.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

/* DESK */
.sofa {
    background: #4caf50;
    margin: 50px;
    padding: 15px;
    border: 2px solid #2e7d32;
}

/* TABLE */
.table {
    background: #2196f3;
    margin: 15px;
    padding: 40px;
    border: 2px solid #0d47a1;
}

/* CHAIR */
.chair {
    background: #ff9800;
    margin: 60px;
    padding: 10px;
    border: 2px solid #e65100;
}

/* FLEX */
.flex {
    display: flex;
    justify-content: center;
    gap: 30px;
}

/* NOTE */
.note {
    font-size: 13px;
    color: #aaa;
}
</style>
</head>

<body>

<h1>💻 Workspace Design: Margin vs Padding</h1>

<!-- TABS -->
<div class="tabs">
    <button onclick="showTab('desk')" class="active">Desk</button>
    <button onclick="showTab('table')">Table</button>
    <button onclick="showTab('compare')">Compare</button>
</div>

<!-- DESK -->
<div id="desk" class="content active">
    <h2>Desk Area</h2>
    <div class="box sofa">
        Large Margin → Free movement<br>
        Small Padding → Compact desk
    </div>
    <div class="note">Outside gap = Margin</div>
</div>

<!-- TABLE -->
<div id="table" class="content">
    <h2>Work Table</h2>
    <div class="box table">
        Small Margin<br>
        Large Padding → More working area
    </div>
</div>

<!-- COMPARISON -->
<div id="compare" class="content">
    <h2>Setup Comparison</h2>
    <div class="flex">
        <div class="box chair">
            Chair<br>Big Margin<br>Less Padding
        </div>
        <div class="box table">
            Table<br>Less Margin<br>More Padding
        </div>
    </div>
</div>

<script>
function showTab(id){
    let tabs = document.querySelectorAll('.content');
    let buttons = document.querySelectorAll('.tabs button');

    tabs.forEach(t => t.classList.remove('active'));
    buttons.forEach(b => b.classList.remove('active'));

    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
}
</script>

</body>
</html>
